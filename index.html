    <title>Vantix</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('vantix.app.theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html.dark { background-color: #000; }
      html:not(.dark) { background-color: #fafafa; }
    </style>
